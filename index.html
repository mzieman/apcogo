{label:"Independent environmental groups lobby for clean energy",choices:["Pluralist","Corporatist"],correct:"Pluralist",explain:"Independent groups operating autonomously to lobby without state sponsorship is a hallmark of pluralism."},
{label:"Gov't creates official labor union as sole worker rep",choices:["Pluralist","Corporatist"],correct:"Corporatist",explain:"A state-created 'sole representative' is a single peak association (SPA) — the government controls which groups access policy-making."},
{label:"Multiple business groups compete to influence trade policy",choices:["Pluralist","Corporatist"],correct:"Pluralist",explain:"Multiple competing autonomous groups seeking influence on the same policy area reflects pluralist competition."},
{label:"State sponsors one farmers' org as only agricultural voice",choices:["Pluralist","Corporatist"],correct:"Corporatist",explain:"State sponsorship of a single sector representative is corporatism — the government controls access through designated groups."},
{label:"Citizens freely form advocacy groups without gov't approval",choices:["Pluralist","Corporatist"],correct:"Pluralist",explain:"Freedom to organize without state approval reflects pluralism — autonomous groups form independently."},
{label:"CCP creates orgs for citizen participation to give image of input",choices:["Pluralist","Corporatist"],correct:"Corporatist",explain:"State-created organizations providing an 'image of input' while controlling participation is Chinese-style corporatism."},
{label:"Post-democratization, Mexicans join independent groups",choices:["Pluralist","Corporatist"],correct:"Pluralist",explain:"Mexico's shift from government-controlled orgs to independent citizen groups reflects its corporatism-to-pluralism transition."}],
quiz:[
{q:"During PRI dominance, Mexico's CTM was the sole representative of organized labor. After democratization, multiple independent unions compete. This corporatist-to-pluralist transition most directly resulted from:",opts:["International trade agreements requiring Mexico to adopt specific labor representation models as a condition of global economic organization membership","The broader democratic transition that weakened PRI's institutional control over civil society, allowing autonomous organizations to form outside state-sanctioned channels","A Supreme Court ruling declaring single peak associations unconstitutional under Mexico's revised democratic constitution after the 2000 election","Labor unions voluntarily choosing to split into smaller organizations to better represent workers in increasingly specialized industries and geographic regions"],correct:1,explain:"Mexico's interest group transformation parallels its democratic transition. As PRI dominance weakened, the government's ability to control civil society through corporatist structures also weakened."},
{q:"Which characteristic of single peak associations most directly explains why corporatist systems give the state more control over citizen input than pluralist systems?",opts:["SPAs are typically larger organizations with more members than pluralist interest groups, giving them more political power to effectively resist state interference","SPAs serve as government-designated sole representatives for entire sectors, meaning the state controls which voices access policy-making by choosing which organization speaks for each group","SPAs operate exclusively at the international level, giving the state complete control over domestic policy by preventing citizen groups from engaging with any foreign organizations","SPAs are funded entirely by citizen donations rather than government revenue, which paradoxically gives the state more control because it can threaten to tax those voluntary donations"],correct:1,explain:"SPAs give the state control because the government designates ONE organization per sector as the policy channel. If you're a worker, you must participate through the state-sanctioned labor SPA."},
{q:"China sponsors organizations for citizen participation (corporatist). A student argues this is identical to UK pluralism because both involve citizen organizations. What is the fundamental flaw?",opts:["The UK has more total organizations than China, so the systems differ in scale but not in the fundamental kind of interest group representation they provide","In the UK citizens freely form autonomous groups that independently advocate to government, while in China the CCP creates and controls the organizations through which citizens participate","China's organizations focus on economic issues while UK organizations focus on social issues, making them categorically different types of groups that cannot be compared","The UK organizations are more effective at actually changing government policy than China's organizations, but the two systems are structurally identical in their basic design"],correct:1,explain:"The fundamental difference is who creates and controls the organizations. UK pluralism: citizens create autonomous groups. Chinese corporatism: the CCP creates and controls groups within state-defined boundaries."},
{q:"Which factor from other Unit 4 topics most directly contributed to Mexico's shift from corporatism to pluralism?",opts:["Creating an independent election commission (IFE/INE) that reduced PRI's electoral manipulation, weakening the party's ability to maintain corporatist control over civil society","Mexico's adoption of proportional representation for all legislative seats, which gave minor parties enough power to dismantle corporatist institutions through new legislation","Iran's Green Movement inspiring Mexican citizens to demand pluralist interest group representation through mass protests organized in Mexico City","The United Kingdom's House of Lords reform providing a successful institutional model for Mexico's transition from appointed to democratically elected interest group representatives"],correct:0,explain:"The IFE's creation weakened PRI's electoral control, which cascaded into weakened control over civil society. When PRI could no longer guarantee wins through fraud, it lost power to maintain corporatist structures."},
{q:"Some European democracies use neo-corporatism where labor, business, and government negotiate cooperatively. How does this complicate comparing Chinese corporatism with European neo-corporatism?",opts:["It doesn't complicate the comparison at all because all forms of corporatism are functionally identical regardless of the broader political context in which they operate","In European neo-corporatism, organizations are genuinely autonomous and voluntarily participate, while in Chinese corporatism the CCP creates and controls participants — making cooperation state-directed rather than negotiated","European neo-corporatism only exists in countries with proportional representation while Chinese corporatism exists under a one-party system, making the electoral system the sole relevant factor","European neo-corporatism involves only business groups while Chinese corporatism involves only labor groups, so they represent fundamentally different economic sectors of society"],correct:1,explain:"The critical distinction is autonomy: European neo-corporatist groups are genuinely independent and choose to participate. Chinese groups are CCP-created and controlled. The form looks similar, but the power relationship differs fundamentally."},
{q:"Which analytical prediction about Mexico's interest group system is best supported by IEF-2.B.4 and broader Unit 4 content about Mexico's democratization?",opts:["Mexico will inevitably return to corporatism because the PRI tradition of state-controlled organizations is too deeply embedded in Mexican political culture to be permanently displaced","As democratic institutions strengthen, Mexico's pluralist system will likely become more diverse and competitive, with autonomous groups increasingly influencing policy independently of any single party","Mexico's pluralist system will collapse because multiple competing interest groups inevitably create policy gridlock that makes corporatism's streamlined single-representative approach more efficient","Mexico's interest group system will converge with China's corporatist model because both countries share similar economic development levels and international trade relationships"],correct:1,explain:"Mexico's trajectory shows democratization strengthening pluralism: PRI weakening → independent elections → diverse parties → independent interest groups. If democratic institutions continue strengthening, pluralist competition should deepen."},
{q:"IEF-2.B.3 states the state retains more control in corporatist systems. Which specific mechanism gives the state this greater control compared to pluralist systems?",opts:["Corporatist states impose higher tax rates on interest groups, reducing their financial resources and organizational ability to effectively oppose government policies","In corporatist systems the government determines which organizations represent each sector and controls their access to policy-making, effectively gatekeeping all citizen input through approved intermediaries","Corporatist states maintain larger military forces that can physically prevent citizen groups from organizing demonstrations or protests outside government buildings and offices","In corporatist systems citizens are legally prohibited from communicating with each other about political topics in any setting outside of government-approved meeting spaces and forums"],correct:1,explain:"The mechanism is institutional gatekeeping: the state designates which organizations speak for each sector and controls their policy access. Citizens must participate through state-approved channels."},
{q:"Using IEF-2.B.1 and IEF-2.B.2, which classification of Nigeria's interest group system is most accurate?",opts:["Corporatist, because Nigeria's government officially designates PDP and APC as the only organizations authorized to represent citizen interests in national policy-making processes","Pluralist, because Nigeria has multiple autonomous organizations like MEND, MOSOP, and various labor unions that independently advocate for different policy positions without state designation","Neither pluralist nor corporatist, because Nigeria's interest group system is too disorganized and fragmented to fit meaningfully into either established analytical framework","Corporatist, because Nigeria's ethnic quota system for its federal legislature functions as a government-controlled mechanism for organizing citizen representation by ethnic group identity"],correct:1,explain:"Nigeria's interest groups (MEND, MOSOP, labor unions, religious organizations) are autonomous, not state-sanctioned. Multiple groups compete to influence policy on overlapping issues — classic pluralist characteristics."},
{q:"Which course country pairing represents the strongest contrast between pluralist and corporatist interest group systems?",opts:["The UK (pluralist) and China (corporatist), because UK's fully autonomous groups and China's CCP-controlled organizations represent opposite ends of the state-control spectrum","Mexico and Nigeria, because Mexico is currently corporatist while Nigeria is pluralist, and both are transitioning democracies at similar developmental stages","Iran and Russia, because Iran's theocratic corporatism and Russia's democratic pluralism represent fundamentally different approaches to the relationship between religion and governance","China and Russia, because China allows eight minor parties while Russia allows only one dominant party, creating significantly different levels of interest group organizational freedom"],correct:0,explain:"The UK and China sit at opposite extremes: UK groups are fully autonomous and compete freely (pluralism), while Chinese groups are CCP-created and controlled (corporatism)."},
{q:"Mexico's experience demonstrates the IEF-2 reinforcement mechanism between citizen organizations and democratization. This claim is best supported because:",opts:["Mexico's corporatist system was originally imposed by foreign colonial powers, and democratization involved throwing off foreign influence to establish an authentically Mexican pluralist tradition","Democratic reforms weakened PRI corporatist control, enabling autonomous pluralist organizations to form, which then pushed for further democratic reforms like gender parity — creating a positive feedback cycle","Mexico's pluralist system was adopted overnight through a single constitutional amendment, proving that institutional changes alone can completely transform interest group systems without broader democratization","Mexico's corporatist organizations voluntarily dissolved themselves when they recognized that pluralism was inherently more effective at representing the full diversity of citizen interests and preferences"],correct:1,explain:"Mexico uniquely illustrates the IEF-2 reinforcement cycle: democratic transition → weakened corporatism → autonomous organizations → further democratic reforms. This bidirectional relationship is exactly what IEF-2 describes."}]
}
];

// ===== STATE =====
let progress={},sortSel={},matchSt={},fcSt={},quizAns={},quizDone={},sortBuilt={},quizBuilt={};
T.forEach(t=>{const k=t.id;progress[k]={learn:false,interactive:false,quiz:false};sortSel[k]={};fcSt[k]={index:0};quizAns[k]={};quizDone[k]=false;sortBuilt[k]=false;quizBuilt[k]=false;});

// ===== BUILD =====
function buildDash(){
  document.getElementById('tg').innerHTML=T.map(t=>`<div class="tc" data-eu="${t.eu}" onclick="showT('${t.id}')"><div class="tn">Topic ${t.id}</div><div class="et">${t.euFull}</div><h3>${t.title}</h3><p>${t.desc}</p><div class="cf"><span class="cp" id="cp-${S(t.id)}">0 / 3</span><div class="ca">→</div></div></div>`).join('');
}
function buildPages(){
  document.getElementById('tps').innerHTML=T.map(t=>{const s=S(t.id);return`<div class="page" id="pg-${s}"><div class="tp-page"><div class="th"><a class="bl" onclick="showDash()">← Dashboard</a><div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);margin-bottom:0.25rem">TOPIC ${t.id} · ${t.skill}</div><h2>${t.title}</h2><div style="margin:0.5rem 0"><span class="ekc">${t.euFull}</span><span style="font-size:0.85rem;color:var(--text-dim)">${t.euText}</span></div><div class="lo">${t.lo}</div></div><div class="tbar" id="tb-${s}"><button class="tbtn active" data-tab="learn" onclick="swTab('${t.id}','learn')">📖 Learn</button><button class="tbtn" data-tab="interactive" onclick="swTab('${t.id}','interactive')">🎮 Practice</button><button class="tbtn" data-tab="quiz" onclick="swTab('${t.id}','quiz')">✍️ Quiz</button></div><div class="ttc active" id="tc-${s}-learn"><div class="ls">${t.learn}</div><div class="cbar"><p style="font-size:0.88rem;color:var(--text-dim);margin-bottom:0.75rem">Finished reading? Continue to practice activities.</p><button class="btn bp" onclick="mDone('${t.id}','learn');swTab('${t.id}','interactive')">Continue to Practice →</button></div></div><div class="ttc" id="tc-${s}-interactive">${t.matchData?`<div class="it">Movement Matcher</div><p class="tp2">Click a term on the left, then its matching description on the right.</p><div id="ma-${s}"></div><button class="btn bp" style="margin-top:1rem" onclick="chkM('${t.id}')">Check Answers</button><div id="mfb-${s}" style="margin-top:1rem"></div>`:''} ${t.sortData?`<div class="it">${t.matchData?'<br>':''}Classification Challenge</div><p class="tp2">Select the correct category for each item.</p><div class="sc" id="so-${s}"></div><button class="btn bp" style="margin-top:1rem" onclick="chkS('${t.id}')">Check Answers</button><div id="sfb-${s}" style="margin-top:1rem"></div>`:''} ${t.flashcards?`<div class="it">Flashcard Review</div><p class="tp2">Click to flip. Use arrows to navigate.</p><div class="fcc"><div class="fc" id="fc-${s}" onclick="flipC('${t.id}')"><div class="fcf"><div class="fcla" id="fcl-${s}"></div><div class="fctm" id="fct-${s}"></div></div><div class="fcb2" id="fcb-${s}"></div></div></div><div class="fcnav"><button class="btn bs" onclick="fcN('${t.id}',-1)">← Prev</button><span class="fcct" id="fcc-${s}"></span><button class="btn bs" onclick="fcN('${t.id}',1)">Next →</button></div>`:''}</div><div class="ttc" id="tc-${s}-quiz"><div id="qz-${s}"></div><button class="btn bp" id="qs-${s}" onclick="subQ('${t.id}')">Submit Quiz</button><div id="qr-${s}"></div></div></div></div>`;}).join('');
}

// ===== NAV =====
function showDash(){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('pg-dash').classList.add('active');document.getElementById('bc').innerHTML='';window.scrollTo(0,0);}
function showT(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('pg-'+S(id)).classList.add('active');document.getElementById('bc').innerHTML=`<a onclick="showDash()">Dashboard</a> / Topic ${id}`;initI(id);buildQ(id);window.scrollTo(0,0);}
function swTab(id,tab){const s=S(id),bar=document.getElementById('tb-'+s);bar.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));['learn','interactive','quiz'].forEach(t=>{document.getElementById('tc-'+s+'-'+t).classList.toggle('active',t===tab);});if(tab==='interactive')initI(id);if(tab==='quiz')buildQ(id);window.scrollTo(0,document.getElementById('tb-'+s).offsetTop-60);}

// ===== SORT =====
function initI(id){const t=T.find(x=>x.id===id),s=S(id);if(t.sortData&&!sortBuilt[id]){document.getElementById('so-'+s).innerHTML=t.sortData.map((item,i)=>`<div class="si" id="si-${s}-${i}"><span class="sl">${item.label}</span><div class="sch">${item.choices.map(c=>`<button class="scb" onclick="sS('${id}',${i},this)">${c}</button>`).join('')}</div></div><div class="se" id="se-${s}-${i}"></div>`).join('');sortBuilt[id]=true;}if(t.flashcards){fcSt[id]={index:0};uFC(id);}if(t.matchData&&!document.getElementById('ma-'+s).dataset.b)bM(id);}
function sS(id,i,btn){btn.closest('.si').querySelectorAll('.scb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');sortSel[id][i]=btn.textContent;}
function chkS(id){const t=T.find(x=>x.id===id),s=S(id);let c=0;t.sortData.forEach((item,i)=>{const si=document.getElementById('si-'+s+'-'+i),se=document.getElementById('se-'+s+'-'+i),picked=sortSel[id]?.[i],ok=picked===item.correct;if(ok)c++;si.querySelectorAll('.scb').forEach(b=>{b.classList.remove('cm','wm');b.disabled=true;if(b.textContent===item.correct)b.classList.add('cm');else if(b.classList.contains('active')&&!ok)b.classList.add('wm');});se.className='se show '+(ok?'ok':'no');se.innerHTML=(ok?'✅ <strong>Correct.</strong> ':'❌ <strong>Incorrect.</strong> The answer is <strong>'+item.correct+'</strong>. ')+item.explain;});const tot=t.sortData.length;document.getElementById('sfb-'+s).innerHTML=`<div class="sb"><div class="sn">${c} / ${tot}</div><div class="slab">${c===tot?'Perfect! 🎉':c>=Math.ceil(tot*0.6)?'Good work — review explanations above.':'Keep studying — review explanations above.'}</div></div>`;if(c>=Math.ceil(tot*0.6))mDone(id,'interactive');}

// ===== FLASHCARD =====
function uFC(id){const t=T.find(x=>x.id===id),s=S(id),st=fcSt[id],fc=t.flashcards[st.index];document.getElementById('fct-'+s).textContent=fc.front;document.getElementById('fcb-'+s).textContent=fc.back;document.getElementById('fcl-'+s).textContent=`Card ${st.index+1} of ${t.flashcards.length}`;document.getElementById('fcc-'+s).textContent=`${st.index+1} / ${t.flashcards.length}`;document.getElementById('fc-'+s).classList.remove('fl');}
function flipC(id){document.getElementById('fc-'+S(id)).classList.toggle('fl');}
function fcN(id,d){const t=T.find(x=>x.id===id),st=fcSt[id];st.index=(st.index+d+t.flashcards.length)%t.flashcards.length;uFC(id);mDone(id,'interactive');}

// ===== MATCH =====
function bM(id){const t=T.find(x=>x.id===id),s=S(id),el=document.getElementById('ma-'+s);matchSt[id]={sel:null,pairs:{},pc:0};const ri=t.matchData.right.map((_,i)=>i);for(let i=ri.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ri[i],ri[j]]=[ri[j],ri[i]];}matchSt[id].ri=ri;el.innerHTML=`<div class="mc"><div class="mcol"><h4>Term</h4>${t.matchData.left.map((m,i)=>`<div class="mi" id="ml-${s}-${i}" onclick="mS('${id}','L',${i})">${m}</div>`).join('')}</div><div class="mcol"><h4>Description</h4>${ri.map(r=>`<div class="mi" id="mr-${s}-${r}" onclick="mS('${id}','R',${r})">${t.matchData.right[r]}</div>`).join('')}</div></div>`;el.dataset.b='1';}
function mS(id,side,idx){const s=S(id),ms=matchSt[id];if(side==='L'){document.querySelectorAll(`#ma-${s} .mcol:first-child .mi`).forEach(m=>{if(!m.classList.contains('pd'))m.classList.remove('sel')});const el=document.getElementById('ml-'+s+'-'+idx);if(!el.classList.contains('pd')){el.classList.add('sel');ms.sel=idx;}}else if(ms.sel!==null){const r=document.getElementById('mr-'+s+'-'+idx);if(r.classList.contains('pd'))return;ms.pairs[ms.sel]=idx;document.getElementById('ml-'+s+'-'+ms.sel).classList.add('pd');document.getElementById('ml-'+s+'-'+ms.sel).classList.remove('sel');r.classList.add('pd');ms.sel=null;}}
function chkM(id){const t=T.find(x=>x.id===id),s=S(id),ms=matchSt[id];let c=0;t.matchData.left.forEach((_,i)=>{const l=document.getElementById('ml-'+s+'-'+i),m=ms.pairs[i];l.classList.remove('ok','no','pd');if(m!==undefined){const r=document.getElementById('mr-'+s+'-'+m);r.classList.remove('pd');if(m===t.matchData.answers[i]){l.classList.add('ok');r.classList.add('ok');c++;}else{l.classList.add('no');r.classList.add('no');}}});const tot=t.matchData.left.length;document.getElementById('mfb-'+s).innerHTML=`<div class="sb"><div class="sn">${c} / ${tot}</div><div class="slab">${c===tot?'Perfect! 🎉':c>=Math.ceil(tot*0.6)?'Good — incorrect matches highlighted red.':'Keep trying — click term, then description.'}</div></div>`;if(c>=Math.ceil(tot*0.6))mDone(id,'interactive');}

// ===== QUIZ =====
function buildQ(id){if(quizBuilt[id])return;const t=T.find(x=>x.id===id),s=S(id);quizAns[id]={};document.getElementById('qz-'+s).innerHTML=t.quiz.map((q,qi)=>`<div class="qq" id="qq-${s}-${qi}"><div class="qn">Question ${qi+1} of ${t.quiz.length}</div><div class="qt">${q.q}</div>${q.opts.map((o,oi)=>`<button class="qo" onclick="qS('${id}',${qi},${oi},this)">${String.fromCharCode(65+oi)}) ${o}</button>`).join('')}<div class="qx" id="qx-${s}-${qi}">${q.explain}</div></div>`).join('');quizBuilt[id]=true;}
function qS(id,qi,oi,btn){if(quizDone[id])return;const s=S(id);document.getElementById('qq-'+s+'-'+qi).querySelectorAll('.qo').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');quizAns[id][qi]=oi;}
function subQ(id){const t=T.find(x=>x.id===id),s=S(id);let c=0;t.quiz.forEach((q,qi)=>{const qq=document.getElementById('qq-'+s+'-'+qi);qq.querySelectorAll('.qo').forEach((btn,oi)=>{btn.classList.remove('sel','cm','wm','rv');btn.disabled=true;btn.style.cursor='default';if(oi===q.correct)btn.classList.add('rv');if(quizAns[id]?.[qi]===oi){if(oi===q.correct){btn.classList.add('cm');c++;}else btn.classList.add('wm');}});document.getElementById('qx-'+s+'-'+qi).classList.add('show');});const tot=t.quiz.length,pct=Math.round(c/tot*100);document.getElementById('qr-'+s).innerHTML=`<div class="sb"><div class="sn">${c} / ${tot}</div><div class="slab">${pct}% — ${pct>=80?'Excellent! 🎉':pct>=60?'Good work! Review explanations.':'Keep studying — review explanations carefully.'}</div></div>`;document.getElementById('qs-'+s).style.display='none';quizDone[id]=true;if(c>=Math.ceil(tot*0.6))mDone(id,'quiz');}

// ===== PROGRESS =====
function mDone(id,type){progress[id][type]=true;uProg();}
function uProg(){let total=0,done=0;T.forEach(t=>{let td=0;['learn','interactive','quiz'].forEach(ty=>{total++;if(progress[t.id][ty]){done++;td++;}});const el=document.getElementById('cp-'+S(t.id));if(el)el.textContent=`${td} / 3`;});document.getElementById('pt').textContent=`${done} / ${total}`;document.getElementById('pf').style.width=`${Math.round(done/total*100)}%`;}

// ===== INIT =====
buildDash();buildPages();uProg();
</script>
</body>
</html>
